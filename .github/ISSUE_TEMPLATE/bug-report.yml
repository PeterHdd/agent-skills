name: Bug Report
description: Report a bug with an existing skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true

  - type: dropdown
    id: skill
    attributes:
      label: Skill
      description: Which skill is affected?
      options:
        - engineering-backend-architect
        - engineering-devops-automator
        - engineering-frontend-developer
        - engineering-ml-engineer
        - engineering-mobile-app-builder
        - engineering-rapid-prototyper
        - engineering-security-engineer
        - engineering-senior-developer
        - engineering-system-designer
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent Runtime
      description: Which agent are you using?
      options:
        - Claude Code
        - Codex
        - Cursor
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include what you asked the agent to do, what it did, and what you expected.
      placeholder: |
        I asked Claude Code to "build a React dashboard with sorting"

        The agent used outdated React class component patterns instead of the hooks/functional patterns from the skill.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can someone else reproduce this?
      placeholder: |
        1. Install the skill with `npx skills add ...`
        2. Ask the agent to "..."
        3. Observe that ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Output
      description: Paste any relevant agent output, error messages, or generated code.
      render: shell

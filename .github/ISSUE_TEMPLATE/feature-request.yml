name: Feature Request
description: Suggest an improvement to an existing skill or request a new one
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request Type
      options:
        - New skill
        - Improvement to existing skill
        - New reference/pattern for existing skill
        - New script for existing skill
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Skill (if applicable)
      description: Which existing skill does this relate to? Leave blank for new skill requests.
      placeholder: e.g., engineering-frontend-developer

  - type: textarea
    id: problem
    attributes:
      label: Problem or Gap
      description: What's missing or what problem would this solve?
      placeholder: |
        The frontend-developer skill doesn't cover Next.js App Router patterns.
        When I ask Claude to build a Next.js app, it falls back to Pages Router.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see added or changed?
      placeholder: |
        Add a references/nextjs-patterns.md covering:
        - App Router with server/client components
        - Server Actions
        - Parallel routes and intercepting routes
    validations:
      required: true
